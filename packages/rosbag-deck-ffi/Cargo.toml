[package]
name = "rosbag-deck-ffi"
description = "FFI bindings to ROS 2 libraries (rosbag2, etc.)"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[features]
# Run bindgen to regenerate src/sys.rs from wrapper/rosbag2_wrapper.h.
# Without this feature, the checked-in src/sys.rs is used as-is.
generate-bindings = ["bindgen"]

[dependencies]
rosbag-deck = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
cc = "1"
bindgen = { version = "0.71", optional = true }
