[package]
name = "rosbag_deck"
description = "CLI and TUI for rosbag-deck"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
rosbag_deck_core = { workspace = true }
rosbag_deck_ffi = { workspace = true }
clap = { workspace = true }
regex = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
ratatui = { workspace = true, optional = true }
crossterm = { workspace = true, optional = true }

[features]
default = ["tui"]
tui = ["dep:ratatui", "dep:crossterm"]

[package.metadata.deb]
name = "ros-humble-rosbag-deck"
maintainer = "Jerry <jerry73204@gmail.com>"
copyright = "2024-2026 Jerry"
extended-description = """\
A fast, interactive ROS 2 bag player written in Rust. \
Play, inspect, and edit rosbag2 files with tape deck-style controls, \
a terminal UI, and Python bindings."""
section = "science"
priority = "optional"
depends = "$auto, ros-humble-rosbag2-cpp, ros-humble-rcutils, ros-humble-rclcpp, ros-humble-rcl, ros-humble-rmw-implementation, ros-humble-tracetools, ros-humble-rosbag2-storage-default-plugins"
assets = [
    # Binary
    ["target/release/rosbag_deck", "opt/ros/humble/bin/rosbag_deck", "755"],
    # package.xml
    ["package.xml", "opt/ros/humble/share/rosbag_deck/package.xml", "644"],
    # Ament index marker (registers package with ament)
    ["deb/ament/marker", "opt/ros/humble/share/ament_index/resource_index/packages/rosbag_deck", "644"],
    # Ament environment hooks
    ["deb/ament/environment/ament_prefix_path.sh", "opt/ros/humble/share/rosbag_deck/environment/ament_prefix_path.sh", "644"],
    ["deb/ament/environment/ament_prefix_path.dsv", "opt/ros/humble/share/rosbag_deck/environment/ament_prefix_path.dsv", "644"],
    ["deb/ament/environment/path.sh", "opt/ros/humble/share/rosbag_deck/environment/path.sh", "644"],
    ["deb/ament/environment/path.dsv", "opt/ros/humble/share/rosbag_deck/environment/path.dsv", "644"],
    # Ament local_setup scripts
    ["deb/ament/package.dsv", "opt/ros/humble/share/rosbag_deck/package.dsv", "644"],
    ["deb/ament/local_setup.bash", "opt/ros/humble/share/rosbag_deck/local_setup.bash", "644"],
    ["deb/ament/local_setup.sh", "opt/ros/humble/share/rosbag_deck/local_setup.sh", "644"],
    ["deb/ament/local_setup.zsh", "opt/ros/humble/share/rosbag_deck/local_setup.zsh", "644"],
    ["deb/ament/local_setup.dsv", "opt/ros/humble/share/rosbag_deck/local_setup.dsv", "644"],
    # Docs
    ["../../README.md", "usr/share/doc/ros-humble-rosbag-deck/README.md", "644"],
]
