[build-system]
requires = ["maturin>=1.9,<2.0"]
build-backend = "maturin"

[project]
name = "rosbag-deck"
version = "0.1.0"
requires-python = ">=3.10"
description = "Python bindings for rosbag-deck"
license = { text = "MIT" }

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "python"
module-name = "rosbag_deck.rosbag_deck"
